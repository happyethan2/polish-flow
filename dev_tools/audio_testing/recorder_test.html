<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV Audio Capture Test (16kHz Mono)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        .controls { display: flex; gap: 1rem; margin: 1rem 0; }
        button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
        #status { margin-top: 1rem; padding: 1rem; background: #f0f0f0; border-radius: 4px; font-family: monospace; }
        .log-entry { border-bottom: 1px solid #ddd; padding: 4px 0; }
        h1 { color: #2563eb; }
    </style>
</head>
<body>
    <h1>WAV Recorder Test</h1>
    <p>Target: <b>16kHz, 16-bit, Mono, Uncompressed WAV</b></p>
    
    <div class="controls">
        <button id="btnRecord">🔴 Record</button>
        <button id="btnStop" disabled>⏹ Stop</button>
    </div>

    <div id="playbackArea"></div>

    <h3>Logs</h3>
    <div id="status">Ready. Click Record to start.</div>

    <script>
        // Configuration
        const TARGET_SAMPLE_RATE = 16000;
        
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;
        let audioInput = null;
        let recordedBuffers = []; // Stores raw Float32 arrays
        let recordingLength = 0;

        const btnRecord = document.getElementById('btnRecord');
        const btnStop = document.getElementById('btnStop');
        const statusDiv = document.getElementById('status');
        const playbackArea = document.getElementById('playbackArea');

        function log(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            statusDiv.prepend(entry);
            console.log(msg);
        }

        btnRecord.onclick = async () => {
            try {
                // 1. Initialize Audio Context
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                log(`AudioContext created. Native Sample Rate: ${audioContext.sampleRate}Hz`);

                // 2. Request Microphone Access
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("Microphone access granted.");

                // 3. Create Source and Processor
                audioInput = audioContext.createMediaStreamSource(mediaStream);
                
                // Buffer size 4096 is a good balance for ScriptProcessor
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                // 4. Handle Audio Data
                recordedBuffers = [];
                recordingLength = 0;

                scriptProcessor.onaudioprocess = (e) => {
                    const inputBuffer = e.inputBuffer.getChannelData(0); // Mono
                    // Clone buffer because it's reused
                    recordedBuffers.push(new Float32Array(inputBuffer));
                    recordingLength += inputBuffer.length;
                };

                // 5. Connect Graph
                audioInput.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination); // Needed for processing to happen

                // UI Update
                btnRecord.disabled = true;
                btnStop.disabled = false;
                log("Recording started...");

            } catch (err) {
                log(`Error: ${err.message}`);
            }
        };

        btnStop.onclick = () => {
            // 1. Stop Recording
            scriptProcessor.disconnect();
            audioInput.disconnect();
            mediaStream.getTracks().forEach(track => track.stop());
            
            btnRecord.disabled = false;
            btnStop.disabled = true;
            log(`Recording stopped. Raw samples collected: ${recordingLength}`);

            // 2. Process Audio
            processAudio();
        };

        function processAudio() {
            // Flatten buffers
            const flatBuffer = mergeBuffers(recordedBuffers, recordingLength);
            
            // Downsample to 16kHz
            const downsampledBuffer = downsampleBuffer(flatBuffer, audioContext.sampleRate, TARGET_SAMPLE_RATE);
            
            // Encode to WAV
            const wavBlob = encodeWAV(downsampledBuffer);
            
            createDownloadLink(wavBlob);
        }

        function mergeBuffers(buffers, len) {
            const result = new Float32Array(len);
            let offset = 0;
            for (let i = 0; i < buffers.length; i++) {
                result.set(buffers[i], offset);
                offset += buffers[i].length;
            }
            return result;
        }

        function downsampleBuffer(buffer, sampleRate, outSampleRate) {
            if (outSampleRate === sampleRate) {
                return buffer;
            }
            if (outSampleRate > sampleRate) {
                log("Error: Downsampling rate is higher than original rate.");
                return buffer;
            }
            
            const sampleRateRatio = sampleRate / outSampleRate;
            const newLength = Math.round(buffer.length / sampleRateRatio);
            const result = new Float32Array(newLength);
            
            let offsetResult = 0;
            let offsetBuffer = 0;

            while (offsetResult < result.length) {
                const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
                
                // Simple averaging (Linear Interpolation lite) for downsampling
                // A more robust solution involves an FIR filter, but this is sufficient for speech testing
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                result[offsetResult] = accum / count;
                
                offsetResult++;
                offsetBuffer = nextOffsetBuffer;
            }
            
            return result;
        }

        function encodeWAV(samples) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            // RIFF chunk descriptor
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');

            // fmt sub-chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM (linear quantization)
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, TARGET_SAMPLE_RATE, true);
            view.setUint32(28, TARGET_SAMPLE_RATE * 2, true); // Byte rate
            view.setUint16(32, 2, true); // Block align
            view.setUint16(34, 16, true); // Bits per sample

            // data sub-chunk
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);

            // Write PCM samples
            floatTo16BitPCM(view, 44, samples);

            log(`Encoded WAV: ${TARGET_SAMPLE_RATE}Hz, 16-bit, Mono. Size: ${(buffer.byteLength / 1024).toFixed(2)} KB`);
            return new Blob([view], { type: 'audio/wav' });
        }

        function floatTo16BitPCM(output, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, input[i]));
                // Convert float [-1.0, 1.0] to int16 [-32768, 32767]
                output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function createDownloadLink(blob) {
            const url = URL.createObjectURL(blob);
            const div = document.createElement('div');
            
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = url;
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `recording_${new Date().getTime()}_16khz.wav`;
            link.innerHTML = '⬇ Download WAV';
            link.style.display = 'block';
            link.style.marginTop = '0.5rem';

            div.appendChild(audio);
            div.appendChild(link);
            div.style.marginTop = '1rem';
            
            playbackArea.innerHTML = ''; // Clear previous
            playbackArea.appendChild(div);
        }
    </script>
</body>
</html>
